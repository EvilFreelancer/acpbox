x-shared-logs: &shared-logs
  logging:
    driver: "json-file"
    options:
      max-size: "100k"

services:
  acpbox:
    #image: evilfreelancer/acpbox:latest
    #pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ACPBOX_GATEWAY_PORT:-8080}:8080"
    environment:
      - ACPBOX_CONFIG_PATH=${ACPBOX_CONFIG_PATH:-}
      - ACPBOX_ACP_COMMAND=${ACPBOX_ACP_COMMAND:-["opencode","acp"]}
      - ACPBOX_ACP_ENV=${ACPBOX_ACP_ENV:-}
      - ACPBOX_ACP_WORKSPACE=/workspace
      - ACPBOX_GATEWAY_HOST=${ACPBOX_GATEWAY_HOST:-0.0.0.0}
      - ACPBOX_GATEWAY_PORT=${ACPBOX_GATEWAY_PORT:-8080}
      - ACPBOX_GATEWAY_WORKERS=${ACPBOX_GATEWAY_WORKERS:-1}
      - ACPBOX_GATEWAY_THREADS=${ACPBOX_GATEWAY_THREADS:-1}
      # Comma-separated list of agents to install
      - AGENTS=${AGENTS:-opencode}
      # Agent API keys
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
    volumes:
      - ./workspace:/workspace
    <<: *shared-logs
