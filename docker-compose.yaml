services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/app/config.yaml}
      - ACP_COMMAND=${ACP_COMMAND:-}
      - ACP_ENV=${ACP_ENV:-}
      - ACP_STARTUP_TIMEOUT_SECONDS=${ACP_STARTUP_TIMEOUT_SECONDS:-30}
      - GATEWAY_HOST=${GATEWAY_HOST:-0.0.0.0}
      - GATEWAY_PORT=${GATEWAY_PORT:-8080}
      - GATEWAY_ACP_BASE_URL=${GATEWAY_ACP_BASE_URL:-http://127.0.0.1:8000}
