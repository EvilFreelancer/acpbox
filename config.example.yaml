# Example gateway config. Copy to config.yaml and adjust.
# Every option can be overridden via environment variables (see .env.example).

acp:
  command:
    - python
    - -m
    - uvicorn
    - acp_sdk.server.app:create_app
    - --host
    - "127.0.0.1"
    - --port
    - "8000"
  env: {}
  startup_timeout_seconds: 30

gateway:
  host: "0.0.0.0"
  port: 8080
  acp_base_url: "http://127.0.0.1:8000"
