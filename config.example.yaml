# Example acpbox config. Copy to config.yaml and adjust.
# Every option can be overridden via environment variables (see .env.example).
# ACP uses stdio (one agent process per request); no HTTP to the agent.

acp:
  command:
    - opencode
    - acp
  env: {}
  workspace: "./workspace"

gateway:
  host: "0.0.0.0"
  port: 8080
  workers: 1
  threads: 1
