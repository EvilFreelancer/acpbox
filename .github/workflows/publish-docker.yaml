# Build Docker image and push to Docker Hub only on version tags (e.g. v1.0.0).
# Runs tests before building; build runs only on push of a tag matching v*.

name: Publish to Docker Hub

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

env:
  REGISTRY: docker.io

jobs:
  test-then-build:
    name: Test, then build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v -m "not integration" --cov=coddy --cov-report=term-missing

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag and metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag || 'dev' }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/acpbox"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            echo "${IMAGE}:latest"
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              MAJOR="${VERSION%%.*}"
              MINOR="${VERSION%.*}"
              echo "${IMAGE}:${MAJOR}"
              echo "${IMAGE}:${MINOR}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
